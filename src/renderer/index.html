<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QwaleCode</title>
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header id="appMenubar" class="app-menubar"></header>

  <main class="workspace">
    <section class="explorer">
      <div id="explorerResizeHandle" class="explorer-resize-handle"></div>
      <div class="explorer-shell">
        <aside class="explorer-side-tabs" aria-label="Explorer Views">
          <button id="sidebarTabExplorer" class="explorer-side-tab active" type="button" title="Explorer">
            <span class="explorer-side-icon explorer-side-icon-files" aria-hidden="true"></span>
          </button>
          <button id="sidebarTabSourceControl" class="explorer-side-tab" type="button" title="Version Control">
            <span class="explorer-side-icon explorer-side-icon-branch" aria-hidden="true"></span>
          </button>
        </aside>

        <div id="explorerPanelView" class="explorer-panel-view active">
          <div class="panel-title panel-title-split">
            <span>Explorer</span>
            <span id="projectInfo" class="project-info">No folder opened</span>
          </div>
          <div id="treeRoot" class="tree"></div>
        </div>

        <div id="sourceControlPanelView" class="explorer-panel-view">
          <div class="panel-title">Version Control</div>
          <div class="scm-panel-body">
            <div id="scmBranchInfo" class="scm-branch-info">No repository loaded.</div>

            <div id="scmSetupSection" class="scm-section">
              <div class="scm-label">Repository setup</div>
              <button id="scmInitRepoBtn" class="scm-btn" type="button">Initialize Repository</button>
              <div class="scm-publish-row">
                <select id="scmHostSelect" class="scm-select">
                  <option value="github">GitHub</option>
                  <option value="gitlab">GitLab</option>
                  <option value="bitbucket">Bitbucket</option>
                  <option value="custom">Custom</option>
                </select>
                <button id="scmOpenHostBtn" class="scm-btn" type="button">Open Host</button>
              </div>
              <input id="scmRemoteUrlInput" class="scm-input" type="text" placeholder="https://host/user/repo.git" />
              <button id="scmPublishBtn" class="scm-btn" type="button">Publish Repository</button>
            </div>

            <div class="scm-section">
              <label class="scm-label" for="scmCommitMessage">Commit message</label>
              <textarea id="scmCommitMessage" class="scm-commit-input" rows="2" placeholder="Describe your changes..."></textarea>

              <div class="scm-label">Changed files</div>
              <div id="scmChangedFiles" class="scm-files-list"></div>

              <button id="scmCommitBtn" class="scm-btn scm-btn-primary" type="button">Commit</button>
            </div>

            <div class="scm-section scm-actions-row">
              <button id="scmPushBtn" class="scm-btn" type="button">Push</button>
              <div id="scmSyncSplit" class="scm-sync-split">
                <button id="scmSyncBtn" class="scm-btn" type="button">Fetch</button>
                <button id="scmSyncMenuBtn" class="scm-btn scm-sync-menu-btn" type="button" title="Sync actions">
                  <span class="terminal-chevron" aria-hidden="true"></span>
                </button>
                <div id="scmSyncMenu" class="scm-sync-menu hidden">
                  <button id="scmSyncFetchOption" class="scm-sync-menu-item" type="button">Fetch</button>
                </div>
              </div>
              <button id="scmRefreshBtn" class="scm-btn" type="button">Refresh</button>
            </div>

            <div class="scm-section">
              <div class="scm-label">Branches</div>
              <div class="scm-branch-row">
                <select id="scmBranchSelect" class="scm-select"></select>
                <button id="scmSwitchBranchBtn" class="scm-btn" type="button">Switch</button>
              </div>
              <div class="scm-branch-row">
                <input id="scmNewBranchInput" class="scm-input" type="text" placeholder="new-branch-name" />
                <button id="scmCreateBranchBtn" class="scm-btn" type="button">Create</button>
              </div>
            </div>

            <div class="scm-section">
              <div class="scm-label">Commit graph</div>
              <div id="scmGraph" class="scm-graph"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="editor-area">
      <div id="editorTabs" class="editor-tabs"></div>
      <div id="editor"></div>
      <div id="editorStatusBar" class="editor-status-bar">
        <span id="statusPosition">Ln -, Col -</span>
        <span id="statusEncoding">UTF-8</span>
      </div>
    </section>
  </main>

  <section id="terminalPanel" class="terminal-panel">
    <div id="terminalResizeHandle" class="terminal-resize-handle"></div>
    <div class="terminal-header">
      <div class="terminal-header-title">Terminal</div>
      <div id="terminalTabs" class="terminal-tabs" aria-label="Terminal sessions"></div>
      <div id="terminalActions" class="terminal-actions">
        <button id="newTerminalBtn" class="terminal-btn" type="button" title="New terminal">+</button>
        <button id="newTerminalTypeBtn" class="terminal-btn terminal-btn-dropdown" type="button" title="Choose terminal type">
          <span class="terminal-chevron" aria-hidden="true"></span>
        </button>
        <div id="terminalTypeMenu" class="terminal-type-menu hidden"></div>
      </div>
    </div>
    <div id="terminalContainer" class="terminal-container"></div>
  </section>

  <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../../node_modules/monaco-editor/min/vs/loader.js"></script>
  <script src="./renderer.js"></script>
</body>
</html>
